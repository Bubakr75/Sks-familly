name: Deploy Web to Firebase

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create missing asset folders
        run: |
          mkdir -p assets/animations assets/images

      - name: Inject service account (assets)
        run: echo "${{ secrets.SERVICE_ACCOUNT_BASE64 }}" | base64 --decode > assets/service_account.json

      - name: Inject Gemini API Key
        run: |
          python3 - << 'PYEOF'
          import os
          api_key = os.environ.get('GEMINI_API_KEY', '').replace('\n', '').replace('\r', '').strip()
          with open('lib/services/gemini_service.dart', 'r') as f:
              content = f.read()
          content = content.replace("String.fromEnvironment('GEMINI_API_KEY')", "'" + api_key + "'")
          with open('lib/services/gemini_service.dart', 'w') as f:
              f.write(content)
          print("OK longueur: " + str(len(api_key)))
          PYEOF
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Build Web
        run: flutter build web --release --no-tree-shake-icons

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Decode service account
        run: echo "${{ secrets.SERVICE_ACCOUNT_BASE64 }}" | base64 --decode > /tmp/sa.json

      - name: Deploy to Firebase Hosting
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          firebase deploy --only hosting --project sks-familly-3f205 --non-interactive
