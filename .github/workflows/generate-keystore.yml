name: Generate Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release-key.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias release \
            -storepass "SKS2026" \
            -keypass "SKS2026" \
            -dname "CN=SKS Family, OU=App, O=SKS, L=Paris, ST=IDF, C=FR"

      - name: Encode to base64
        run: |
          echo "========== COPY EVERYTHING BETWEEN THE LINES =========="
          base64 -w 0 release-key.jks
          echo ""
          echo "========== END =========="
