name: Build Flutter APK v2

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Backup custom files
        run: |
          cp android/app/google-service.json /tmp/google-services.json 2>/dev/null || true
          cp android/app/build.gradle.kts /tmp/build.gradle.kts
          cp android/app/src/main/AndroidManifest.xml /tmp/AndroidManifest.xml
          cp android/app/proguard-rules.pro /tmp/proguard-rules.pro 2>/dev/null || true
          cp android/gradle.properties /tmp/gradle.properties 2>/dev/null || true

      - name: Regenerate Android folder
        run: |
          rm -rf android
          flutter create --platforms android --org com.familyscore --project-name family_score .
          cp /tmp/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp /tmp/gradle.properties android/gradle.properties 2>/dev/null || true

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/release-key.jks

      - name: Enable desugaring
        run: |
          python3 - << 'PYEOF'
          with open('android/app/build.gradle.kts', 'r') as f:
              content = f.read()
          if 'isCoreLibraryDesugaringEnabled' not in content:
              content = content.replace('compileOptions {', 'compileOptions {\n        isCoreLibraryDesugaringEnabled = true')
          if 'desugar_jdk_libs' not in content:
              content += '\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")\n}\n'
          with open('android/app/build.gradle.kts', 'w') as f:
              f.write(content)
          print("Desugaring OK")
          PYEOF

      - name: Configure signing
        run: |
          echo "storePassword=SKS2026" > android/key.properties
          echo "keyPassword=SKS2026" >> android/key.properties
          echo "keyAlias=release" >> android/key.properties
          echo "storeFile=../release-key.jks" >> android/key.properties
          python3 - << 'PYEOF'
          with open('android/app/build.gradle.kts', 'r') as f:
              content = f.read()
          header = "import java.util.Properties\nimport java.io.FileInputStream\nval keystoreProperties = Properties()\nval keystorePropertiesFile = rootProject.file(\"key.properties\")\nif (keystorePropertiesFile.exists()) {\n    keystoreProperties.load(FileInputStream(keystorePropertiesFile))\n}\n\n"
          if 'keystoreProperties' not in content:
              content = header + content
          sc = "\n    signingConfigs {\n        create(\"release\") {\n            keyAlias = keystoreProperties[\"keyAlias\"] as String?\n            keyPassword = keystoreProperties[\"keyPassword\"] as String?\n            storeFile = keystoreProperties[\"storeFile\"]?.let { file(it as String) }\n            storePassword = keystoreProperties[\"storePassword\"] as String?\n        }\n    }\n"
          content = content.replace('    buildTypes {', sc + '    buildTypes {')
          with open('android/app/build.gradle.kts', 'w') as f:
              f.write(content)
          print("Signing OK")
          PYEOF

      - name: Inject Gemini API Key
        run: |
          python3 - << 'PYEOF'
          import os
          api_key = os.environ.get('GEMINI_API_KEY', '').replace('\n', '').replace('\r', '').strip()
          with open('lib/services/gemini_service.dart', 'r') as f:
              content = f.read()
          content = content.replace("String.fromEnvironment('GEMINI_API_KEY')", "'" + api_key + "'")
          with open('lib/services/gemini_service.dart', 'w') as f:
              f.write(content)
          print("OK longueur: " + str(len(api_key)))
          PYEOF
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: family-score-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v4.8.0+${{ github.run_number }}
          name: "Family Score v4.8.0+${{ github.run_number }}"
          body: "Build #${{ github.run_number }}"
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
