      - name: Inject Gemini API Key
        run: |
          python3 - << 'PYEOF'
          import os, re
          api_key = os.environ.get('GEMINI_API_KEY', '').replace('\n', '').replace('\r', '').strip()
          with open('lib/services/gemini_service.dart', 'r') as f:
              content = f.read()
          content = content.replace(
              "String.fromEnvironment('GEMINI_API_KEY')",
              f"'{api_key}'"
          )
          with open('lib/services/gemini_service.dart', 'w') as f:
              f.write(content)
          print(f"Injection terminée. Clé longueur: {len(api_key)}")
          PYEOF
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
