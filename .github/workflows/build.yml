      - name: Inject Gemini API Key
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import os
          key = os.environ['GEMINI_KEY']
          with open('lib/services/gemini_service.dart', 'r') as f:
              content = f.read()
          content = content.replace('REMPLACE_PAR_TA_CLE', key)
          with open('lib/services/gemini_service.dart', 'w') as f:
              f.write(content)
          print("Cle injectee avec succes")
          PYEOF
