name: Build Flutter APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Backup custom files
        run: |
          cp android/app/google-service.json /tmp/google-services.json 2>/dev/null || true
          cp android/app/build.gradle.kts /tmp/build.gradle.kts
          cp android/app/src/main/AndroidManifest.xml /tmp/AndroidManifest.xml
          cp android/app/proguard-rules.pro /tmp/proguard-rules.pro 2>/dev/null || true
          cp android/gradle.properties /tmp/gradle.properties 2>/dev/null || true
          cp android/key.properties /tmp/key.properties 2>/dev/null || true

      - name: Regenerate Android folder
        run: |
          rm -rf android
          flutter create --platforms android --org com.familyscore --project-name family_score .
          cp /tmp/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp /tmp/gradle.properties android/gradle.properties 2>/dev/null || true

      - name: Enable core library desugaring
        run: |
          cat > /tmp/fix_gradle.py << 'EOF'
          import re

          with open('android/app/build.gradle.kts', 'r') as f:
              content = f.read()

          # Add isCoreLibraryDesugaringEnabled in compileOptions
          content = content.replace(
              'compileOptions {',
              'compileOptions {\n        isCoreLibraryDesugaringEnabled = true'
          )

          # Add coreLibraryDesugaring dependency at the end of dependencies block
          # Find the last closing brace of dependencies
          dep_pattern = r'(dependencies\s*\{)'
          match = re.search(dep_pattern, content)
          if match:
              # Find the position after "dependencies {"
              start = match.end()
              # Insert the dependency right after the opening brace
              content = content[:start] + '\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")' + content[start:]

          with open('android/app/build.gradle.kts', 'w') as f:
              f.write(content)

          print("build.gradle.kts patched successfully")
          EOF
          python3 /tmp/fix_gradle.py
          echo "--- Patched build.gradle.kts ---"
          cat android/app/build.gradle.kts

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Build APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: family-score-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
