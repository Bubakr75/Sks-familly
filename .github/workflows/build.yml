name: Build Flutter APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Backup custom files
        run: |
          cp android/app/google-services.json /tmp/google-services.json
          cp android/app/build.gradle.kts /tmp/build.gradle.kts
          cp android/app/src/main/AndroidManifest.xml /tmp/AndroidManifest.xml
          cp android/app/proguard-rules.pro /tmp/proguard-rules.pro 2>/dev/null || true
          cp android/settings.gradle.kts /tmp/settings.gradle.kts 2>/dev/null || true
          cp android/build.gradle.kts /tmp/root-build.gradle.kts 2>/dev/null || true
          cp android/gradle.properties /tmp/gradle.properties 2>/dev/null || true
          cp android/key.properties /tmp/key.properties 2>/dev/null || true

      - name: Regenerate Android folder
        run: |
          rm -rf android
          flutter create --platforms android .
          cp /tmp/google-services.json android/app/google-services.json
          cp /tmp/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp /tmp/build.gradle.kts android/app/build.gradle.kts
          cp /tmp/proguard-rules.pro android/app/proguard-rules.pro 2>/dev/null || true
          cp /tmp/gradle.properties android/gradle.properties 2>/dev/null || true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: family-score-apk
          path: build/app/outputs/flutter-apk/app-release.apk
