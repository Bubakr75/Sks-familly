name: Build Flutter APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'

      - name: Backup custom files
        run: |
          cp android/app/google-service.json /tmp/google-services.json 2>/dev/null || true
          cp android/app/build.gradle.kts /tmp/build.gradle.kts
          cp android/app/src/main/AndroidManifest.xml /tmp/AndroidManifest.xml
          cp android/app/proguard-rules.pro /tmp/proguard-rules.pro 2>/dev/null || true
          cp android/gradle.properties /tmp/gradle.properties 2>/dev/null || true
          cp android/key.properties /tmp/key.properties 2>/dev/null || true

      - name: Regenerate Android folder
        run: |
          rm -rf android
          flutter create --platforms android --org com.familyscore --project-name family_score .
          cp /tmp/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp /tmp/gradle.properties android/gradle.properties 2>/dev/null || true

      - name: Show and patch build.gradle.kts
        run: |
          echo "=== ORIGINAL build.gradle.kts ==="
          cat -n android/app/build.gradle.kts
          echo "=== END ORIGINAL ==="
          
          cat > /tmp/fix_gradle.py << 'PYEOF'
          with open('android/app/build.gradle.kts', 'r') as f:
              lines = f.readlines()

          new_lines = []
          in_android = False
          compile_options_done = False
          dependencies_found = False

          for i, line in enumerate(lines):
              new_lines.append(line)
              
              # Add isCoreLibraryDesugaringEnabled after compileOptions {
              if 'compileOptions' in line and '{' in line and not compile_options_done:
                  new_lines.append('        isCoreLibraryDesugaringEnabled = true\n')
                  compile_options_done = True
              
              # Add coreLibraryDesugaring after the last dependencies {
              if line.strip().startswith('dependencies') and '{' in line:
                  dependencies_found = True
                  dep_line_index = len(new_lines)

          # Insert coreLibraryDesugaring right after the last dependencies {
          if dependencies_found and dep_line_index:
              new_lines.insert(dep_line_index, '    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")\n')

          with open('android/app/build.gradle.kts', 'w') as f:
              f.writelines(new_lines)

          print("Patch applied successfully")
          PYEOF
          python3 /tmp/fix_gradle.py
          
          echo "=== PATCHED build.gradle.kts ==="
          cat -n android/app/build.gradle.kts
          echo "=== END PATCHED ==="

      - name: Get dependencies
        run: flutter pub get

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Build APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: family-score-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
