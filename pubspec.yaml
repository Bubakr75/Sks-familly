name: family_score
description: "SKS Family - Systeme de points et recompenses pour la famille"
publish_to: 'none'
version:version: 4.3.0+8

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: 6.1.5+1
  hive: 2.2.3
  hive_flutter: 1.1.0
  shared_preferences: 2.5.3
  intl: ^0.19.0
  uuid: ^4.5.1
  fl_chart: ^0.69.0
  table_calendar: ^3.1.2
  path_provider: ^2.1.5

  # Firebase
  firebase_core: 3.6.0
  cloud_firestore: 5.4.3

  # Image picker
  image_picker: ^1.1.2

  # Animations avancees
  lottie: ^3.3.1
  rive: ^0.14.4
  sensors_plus: ^6.1.1

  # Local notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Auto update
  package_info_plus: ^8.0.0
  open_filex: ^4.5.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1a1a2e"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
